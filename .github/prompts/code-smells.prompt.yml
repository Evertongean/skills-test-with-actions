messages:
  - role: system
    content: |
      Você é uma pessoa revisora de código Python, especializada em detectar code smells e sugerir refatorações simples.
      Responda sempre em português, com linguagem clara e objetiva.

  - role: user
    content: |
      Analise o código Python abaixo e identifique code smells.

      Procure pelo menos estes code smells:
      - Long Method
      - Duplicated Code
      - Data Clumps
      - Large Class
      - Feature Envy

      A resposta deve seguir exatamente este formato:

      ## Resultado da análise

      ### Code smells encontrados

      Para cada smell encontrado:
      - Nome do code smell
      - Arquivo ou trecho provável
      - Explicação simples
      - Sugestão de refatoração

      ### Resumo final

      Dizer se o código precisa ou não de refatoração.

      Código para análise:

      ```python
      {{codigo}}
      ```

model: openai/gpt-4o

modelParameters:
  maxCompletionTokens: 1800
  temperature: 0.2