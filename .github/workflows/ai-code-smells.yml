name: AI Code Smells

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  models: read
  pull-requests: read

jobs:
  detect-code-smells:
    name: Detect code smells with AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect Python files
        run: |
          echo "Coletando arquivos Python..."

          find . -type f -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./venv/*" \
            -not -path "./.venv/*" \
            -not -path "*/__pycache__/*" \
            -print | sort > arquivos_python.txt

          echo "" > codigo_para_analise.txt

          while read arquivo; do
            echo "==============================" >> codigo_para_analise.txt
            echo "ARQUIVO: $arquivo" >> codigo_para_analise.txt
            echo "==============================" >> codigo_para_analise.txt
            sed -n '1,400p' "$arquivo" >> codigo_para_analise.txt
            echo "" >> codigo_para_analise.txt
          done < arquivos_python.txt

          echo "Arquivos enviados para análise:"
          cat arquivos_python.txt

      - name: Analyze code smells with AI
        id: ai_analysis
        uses: actions/ai-inference@v1
        with:
          prompt-file: ./.github/prompts/code-smells.prompt.yml
          file_input: |
            codigo: ./codigo_para_analise.txt

      - name: Show AI analysis result
        run: |
          echo "Resultado da análise de code smells:"
          echo "${{ steps.ai_analysis.outputs.response }}"
